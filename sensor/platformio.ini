; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeed_xiao_esp32_c6]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
test_speed = 115200
board = seeed-xiao-esp32-c6
framework = arduino
lib_deps = 
	knolleary/PubSubClient@^2.8
	mikalhart/TinyGPSPlus@^1.1.0
	bblanchon/ArduinoJson@^7.4.2
	miguel5612/MQUnifiedsensor@^3.0.5
	plerup/EspSoftwareSerial@^8.2.0
	; lorol/LittleFS_esp32@^1.0.6
	https://github.com/labfruits/mcp320x.git
board_build.filesystem = littlefs


;1. Автоматично запускати монітор після завантаження
targets = upload, monitor

; 2. Налаштування швидкості (має збігатися з Serial.begin)
monitor_speed = 115200

; 3. Важливо для ESP32-C6: активуємо USB CDC (друк через USB)
build_flags = 
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1

; 4. Керування сигналами скидання (допомагає, якщо монітор "залипає")
monitor_dtr = 0
monitor_rts = 0